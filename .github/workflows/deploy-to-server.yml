name: Deploy to Server

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
                
            - name: Create .env file
              run: |
                echo "${{ secrets.CLIENT_ENV_VARS }}" > ./server/.env
            
            - name: Build Docker image
              run: |
                docker build -t ${{ secrets.DOCKER_USERNAME }}/my-social-media-app-server:v1.0 ./Server

            - name: Push Docker image
              run: |
                docker push ${{ secrets.DOCKER_USERNAME }}/my-social-media-app-server:v1.0

    deploy:
        name: Deploy via SSH
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to server
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.SSH_SERVER }}
                username: ${{ secrets.SSH_USER }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                script: |
                  mkdir -p ~/project/mysosmed/server
                  cd ~/project/mysosmed/server
                  echo ${{ vars.APP_COMPOSE }} | base64 -d > docker-compose.yml
                  docker compose pull
                  docker compose up -d